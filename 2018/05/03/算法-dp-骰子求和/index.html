public</span> List&lt;Map.Entry&lt;Integer, Double&gt;&gt; dicesSum(<span class="keyword">int</span> n) &#123;</div><div class="line">        <span class="comment">// Write your code here</span></div><div class="line">        <span class="comment">// Ps. new AbstractMap.SimpleEntry&lt;Integer, Double&gt;(sum, pro)</span></div><div class="line">        <span class="comment">// to create the pair</span></div><div class="line">        <span class="keyword">long</span>[][] dp = <span class="keyword">new</span> <span class="keyword">long</span>[n+<span class="number">1</span>][<span class="number">6</span>*n+<span class="number">1</span>];</div><div class="line">        dp[<span class="number">1</span>][<span class="number">1</span>] = <span class="number">1</span>;</div><div class="line">        dp[<span class="number">1</span>][<span class="number">2</span>] = <span class="number">1</span>;</div><div class="line">        dp[<span class="number">1</span>][<span class="number">3</span>] = <span class="number">1</span>;</div><div class="line">        dp[<span class="number">1</span>][<span class="number">4</span>] = <span class="number">1</span>;</div><div class="line">        dp[<span class="number">1</span>][<span class="number">5</span>] = <span class="number">1</span>;</div><div class="line">        dp[<span class="number">1</span>][<span class="number">6</span>] = <span class="number">1</span>;</div><div class="line"></div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">2</span>; i &lt;=n; i++) &#123;</div><div class="line">            <span class="keyword">for</span> (<span class="keyword">int</span> j = i; j &lt;= i * <span class="number">6</span>; j++) &#123;</div><div class="line">                <span class="keyword">long</span> x1=<span class="number">0</span>, x2=<span class="number">0</span>, x3=<span class="number">0</span>, x4=<span class="number">0</span>, x5=<span class="number">0</span>, x6=<span class="number">0</span>;</div><div class="line">                </div><div class="line">                <span class="keyword">if</span> (j-<span class="number">1</span> &gt; <span class="number">0</span>) &#123;</div><div class="line">                    x1 = dp[i-<span class="number">1</span>][j-<span class="number">1</span>];</div><div class="line">                &#125;</div><div class="line">                <span class="keyword">if</span>(j-<span class="number">2</span>&gt;<span class="number">0</span>)&#123;    </div><div class="line">                x2=dp[i-<span class="number">1</span>][j-<span class="number">2</span>];    </div><div class="line">                &#125;    </div><div class="line">                <span class="keyword">if</span>(j-<span class="number">3</span>&gt;<span class="number">0</span>)&#123;    </div><div class="line">                    x3=dp[i-<span class="number">1</span>][j-<span class="number">3</span>];    </div><div class="line">                &#125;    </div><div class="line">                <span class="keyword">if</span>(j-<span class="number">4</span>&gt;<span class="number">0</span>)&#123;    </div><div class="line">                    x4=dp[i-<span class="number">1</span>][j-<span class="number">4</span>];    </div><div class="line">                &#125;    </div><div class="line">                <span class="keyword">if</span>(j-<span class="number">5</span>&gt;<span class="number">0</span>)&#123;    </div><div class="line">                    x5=dp[i-<span class="number">1</span>][j-<span class="number">5</span>];    </div><div class="line">                &#125;    </div><div class="line">                <span class="keyword">if</span>(j-<span class="number">6</span>&gt;<span class="number">0</span>)&#123;    </div><div class="line">                    x6=dp[i-<span class="number">1</span>][j-<span class="number">6</span>];    </div><div class="line">                &#125;    </div><div class="line">                dp[i][j]=x1+x2+x3+x4+x5+x6;  </div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        List&lt;Map.Entry&lt;Integer, Double&gt;&gt; result=<span class="keyword">new</span> ArrayList&lt;Map.Entry&lt;Integer,Double&gt;&gt;();    </div><div class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i=n;i&lt;=<span class="number">6</span>*n;i++)&#123;    </div><div class="line">            AbstractMap.SimpleEntry&lt;Integer, Double&gt; entry=<span class="keyword">new</span> AbstractMap.SimpleEntry&lt;Integer, Double&gt;(i, dp[n][i]/Math.pow(<span class="number">6</span>, n));    </div><div class="line">            result.add(entry);    </div><div class="line">        &#125;    </div><div class="line">        <span class="keyword">return</span> result; </div><div class="line">        </div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
