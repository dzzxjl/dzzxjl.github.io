注销</div><div class="line">- cd /home 进入 &apos;/ home&apos; 目录&apos;</div><div class="line">- cd .. 返回上一级目录</div><div class="line">- cd ../.. 返回上两级目录</div><div class="line">- cd 进入个人的主目录</div><div class="line">- cd ~user1 进入个人的主目录</div><div class="line">- cd - 返回上次所在的目录</div><div class="line">- pwd 显示工作路径</div><div class="line">- ls 查看目录中的文件</div><div class="line">- ls -F 查看目录中的文件</div><div class="line">- ls -l 显示文件和目录的详细资料</div><div class="line">- ls -a 显示隐藏文件</div><div class="line">- ls *[0-9]* 显示包含数字的文件名和目录名</div><div class="line">- tree 显示文件和目录由根目录开始的树形结构(1)</div><div class="line">- lstree 显示文件和目录由根目录开始的树形结构(2)</div><div class="line">- mkdir dir1 创建一个叫做 &apos;dir1&apos; 的目录&apos;</div><div class="line">- mkdir dir1 dir2 同时创建两个目录</div><div class="line">- mkdir -p /tmp/dir1/dir2 创建一个目录树</div><div class="line">- rm -f file1 删除一个叫做 &apos;file1&apos; 的文件&apos;</div><div class="line">- rmdir dir1 删除一个叫做 &apos;dir1&apos; 的目录&apos;</div><div class="line">- rm -rf dir1 删除一个叫做 &apos;dir1&apos; 的目录并同时删除其内容</div><div class="line">- rm -rf dir1 dir2 同时删除两个目录及它们的内容</div><div class="line">- mv dir1 new_dir 重命名/移动 一个目录</div><div class="line">- cp file1 file2 复制一个文件</div><div class="line">- cp dir/* . 复制一个目录下的所有文件到当前工作目录</div><div class="line">- cp -a /tmp/dir1 . 复制一个目录到当前工作目录</div><div class="line">- cp -a dir1 dir2 复制一个目录</div><div class="line">- ln -s file1 lnk1 创建一个指向文件或目录的软链接</div><div class="line">- ln file1 lnk1 创建一个指向文件或目录的物理链接</div><div class="line">- touch -t 0712250000 file1 修改一个文件或目录的时间戳 - (YYMMDDhhmm)</div><div class="line">- file file1 outputs the mime type of the file as text</div><div class="line">- iconv -l 列出已知的编码</div><div class="line">- iconv -f fromEncoding -t toEncoding inputFile &gt; outputFile creates a new from the given input file by assuming it is encoded in fromEncoding and converting it to toEncoding.</div><div class="line">- find . -maxdepth 1 -name *.jpg -print -exec convert &quot;&#123;&#125;&quot; -resize 80x60 &quot;thumbs/&#123;&#125;&quot; \; batch resize files in the current directory and send them to a thumbnails directory (requires convert from Imagemagick)</div><div class="line">- find / -name file1 从 &apos;/&apos; 开始进入根文件系统搜索文件和目录</div><div class="line">- find / -user user1 搜索属于用户 &apos;user1&apos; 的文件和目录</div><div class="line">- find /home/user1 -name \*.bin 在目录 &apos;/ home/user1&apos; 中搜索带有&apos;.bin&apos; 结尾的文件</div><div class="line">- find /usr/bin -type f -atime +100 搜索在过去100天内未被使用过的执行文件</div><div class="line">- find /usr/bin -type f -mtime -10 搜索在10天内被创建或者修改过的文件</div><div class="line">- find / -name \*.rpm -exec chmod 755 &apos;&#123;&#125;&apos; \; 搜索以 &apos;.rpm&apos; 结尾的文件并定义其权限</div><div class="line">- find / -xdev -name \*.rpm 搜索以 &apos;.rpm&apos; 结尾的文件，忽略光驱、捷盘等可移动设备</div><div class="line">- locate \*.ps 寻找以 &apos;.ps&apos; 结尾的文件 - 先运行 &apos;updatedb&apos; 命令</div><div class="line">- whereis halt 显示一个二进制文件、源码或man的位置</div><div class="line">- which halt 显示一个二进制文件或可执行文件的完整路径</div><div class="line">- mount /dev/hda2 /mnt/hda2 挂载一个叫做hda2的盘 - 确定目录 &apos;/ mnt/hda2&apos; 已经存在</div><div class="line">- umount /dev/hda2 卸载一个叫做hda2的盘 - 先从挂载点 &apos;/ mnt/hda2&apos; 退出</div><div class="line">- fuser -km /mnt/hda2 当设备繁忙时强制卸载</div><div class="line">- umount -n /mnt/hda2 运行卸载操作而不写入 /etc/mtab 文件- 当文件为只读或当磁盘写满时非常有用</div><div class="line">- mount /dev/fd0 /mnt/floppy 挂载一个软盘</div><div class="line">- mount /dev/cdrom /mnt/cdrom 挂载一个cdrom或dvdrom</div><div class="line">- mount /dev/hdc /mnt/cdrecorder 挂载一个cdrw或dvdrom</div><div class="line">- mount /dev/hdb /mnt/cdrecorder 挂载一个cdrw或dvdrom</div><div class="line">- mount -o loop file.iso /mnt/cdrom 挂载一个文件或ISO镜像文件</div><div class="line">- mount -t vfat /dev/hda5 /mnt/hda5 挂载一个Windows FAT32文件系统</div><div class="line">- mount /dev/sda1 /mnt/usbdisk 挂载一个usb 捷盘或闪存设备</div><div class="line">- mount -t smbfs -o username=user,password=pass //WinClient/share /mnt/share 挂载一个windows网络共享</div><div class="line">- df -h 显示已经挂载的分区列表</div><div class="line">- ls -lSr |more 以尺寸大小排列文件和目录</div><div class="line">- du -sh dir1 估算目录 &apos;dir1&apos; 已经使用的磁盘空间&apos;</div><div class="line">- du -sk * | sort -rn 以容量大小为依据依次显示文件和目录的大小</div><div class="line">- rpm -q -a --qf &apos;%10&#123;SIZE&#125;t%&#123;NAME&#125;n&apos; | sort -k1,1n 以大小为依据依次显示已安装的rpm包所使用的空间 (fedora, redhat类系统)</div><div class="line">- dpkg-query -W -f=&apos;$&#123;Installed-Size;10&#125;t$&#123;Package&#125;n&apos; | sort -k1,1n 以大小为依据显示已安装的deb包所使用的空间 (ubuntu, debian类系统)</div><div class="line">- groupadd group_name 创建一个新用户组</div><div class="line">- groupdel group_name 删除一个用户组</div><div class="line">- groupmod -n new_group_name old_group_name 重命名一个用户组</div><div class="line">- useradd -c &quot;Name Surname &quot; -g admin -d /home/user1 -s /bin/bash user1 创建一个属于 &quot;admin&quot; 用户组的用户</div><div class="line">- useradd user1 创建一个新用户</div><div class="line">- userdel -r user1 删除一个用户 ( &apos;-r&apos; 排除主目录)</div><div class="line">- usermod -c &quot;User FTP&quot; -g system -d /ftp/user1 -s /bin/nologin user1 修改用户属性</div><div class="line">- passwd 修改口令</div><div class="line">- passwd user1 修改一个用户的口令 (只允许root执行)</div><div class="line">- chage -E 2005-12-31 user1 设置用户口令的失效期限</div><div class="line">- pwck 检查 &apos;/etc/passwd&apos; 的文件格式和语法修正以及存在的用户</div><div class="line">- grpck 检查 &apos;/etc/passwd&apos; 的文件格式和语法修正以及存在的群组</div><div class="line">- newgrp group_name 登陆进一个新的群组以改变新创建文件的预设群组</div><div class="line">- ls -lh 显示权限</div><div class="line">- ls /tmp | pr -T5 -W$COLUMNS 将终端划分成5栏显示</div><div class="line">- chmod ugo+rwx directory1 设置目录的所有人(u)、群组(g)以及其他人(o)以读（r ）、写(w)和执行(x)的权限</div><div class="line">- chmod go-rwx directory1 删除群组(g)与其他人(o)对目录的读写执行权限</div><div class="line">- chown user1 file1 改变一个文件的所有人属性</div><div class="line">- chown -R user1 directory1 改变一个目录的所有人属性并同时改变改目录下所有文件的属性</div><div class="line">- chgrp group1 file1 改变文件的群组</div><div class="line">- chown user1:group1 file1 改变一个文件的所有人和群组属性</div><div class="line">- find / -perm -u+s 罗列一个系统中所有使用了SUID控制的文件</div><div class="line"> ne">- apt-cache search searched-package 返回包含所要搜索字符串的软件包名称</div><div class="line">- cat file1 从第一个字节开始正向查看文件的内容</div><div class="line">- tac file1 从最后一行开始反向查看一个文件的内容</div><div class="line">- more file1 查看一个长文件的内容</div><div class="line">- less file1 类似于 &apos;more&apos; 命令，但是它允许在文件中和正向操作一样的反向操作</div><div class="line">- head -2 file1 查看一个文件的前两行</div><div class="line">- tail -2 file1 查看一个文件的最后两行</div><div class="line">- tail -f /var/log/messages 实时查看被添加到一个文件中的内容</div><div class="line">- cat file1 file2 ... | command &lt;&gt; file1_in.txt_or_file1_out.txt general syntax for text manipulation using PIPE, STDIN and STDOUT</div><div class="line">- cat file1 | command( sed, grep, awk, grep, etc...) &gt; result.txt 合并一个文件的详细说明文本，并将简介写入一个新文件中</div><div class="line">- cat file1 | command( sed, grep, awk, grep, etc...) &gt;&gt; result.txt 合并一个文件的详细说明文本，并将简介写入一个已有的文件中</div><div class="line">- grep Aug /var/log/messages 在文件 &apos;/var/log/messages&apos;中查找关键词&quot;Aug&quot;</div><div class="line">- grep ^Aug /var/log/messages 在文件 &apos;/var/log/messages&apos;中查找以&quot;Aug&quot;开始的词汇</div><div class="line">- grep [0-9] /var/log/messages 选择 &apos;/var/log/messages&apos; 文件中所有包含数字的行</div><div class="line">- grep Aug -R /var/log/* 在目录 &apos;/var/log&apos; 及随后的目录中搜索字符串&quot;Aug&quot;</div><div class="line">- sed &apos;s/stringa1/stringa2/g&apos; example.txt 将example.txt文件中的 &quot;string1&quot; 替换成 &quot;string2&quot;</div><div class="line">- sed &apos;/^$/d&apos; example.txt 从example.txt文件中删除所有空白行</div><div class="line">- sed &apos;/ *#/d; /^$/d&apos; example.txt 从example.txt文件中删除所有注释和空白行</div><div class="line">- echo &apos;esempio&apos; | tr &apos;[:lower:]&apos; &apos;[:upper:]&apos; 合并上下单元格内容</div><div class="line">- sed -e &apos;1d&apos; result.txt 从文件example.txt 中排除第一行</div><div class="line">- sed -n &apos;/stringa1/p&apos; 查看只包含词汇 &quot;string1&quot;的行</div><div class="line">- sed -e &apos;s/ *$//&apos; example.txt 删除每一行最后的空白字符</div><div class="line">- sed -e &apos;s/stringa1//g&apos; example.txt 从文档中只删除词汇 &quot;string1&quot; 并保留剩余全部</div><div class="line">- sed -n &apos;1,5p;5q&apos; example.txt 查看从第一行到第5行内容</div><div class="line">- sed -n &apos;5p;5q&apos; example.txt 查看第5行</div><div class="line">- sed -e &apos;s/00*/0/g&apos; example.txt 用单个零替换多个零</div><div class="line">- cat -n file1 标示文件的行数</div><div class="line">- cat example.txt | awk &apos;NR%2==1&apos; 删除example.txt文件中的所有偶数行</div><div class="line">- echo a b c | awk &apos;&#123;print $1&#125;&apos; 查看一行第一栏</div><div class="line">- echo a b c | awk &apos;&#123;print $1,$3&#125;&apos; 查看一行的第一和第三栏</div><div class="line">- paste file1 file2 合并两个文件或两栏的内容</div><div class="line">- paste -d &apos;+&apos; file1 file2 合并两个文件或两栏的内容，中间用&quot;+&quot;区分</div><div class="line">- sort file1 file2 排序两个文件的内容</div><div class="line">- sort file1 file2 | uniq 取出两个文件的并集(重复的行只保留一份)</div><div class="line">- sort file1 file2 | uniq -u 删除交集，留下其他的行</div><div class="line">- sort file1 file2 | uniq -d 取出两个文件的交集(只留下同时存在于两个文件中的文件)</div><div class="line">- comm -1 file1 file2 比较两个文件的内容只删除 &apos;file1&apos; 所包含的内容</div><div class="line">- comm -2 file1 file2 比较两个文件的内容只删除 &apos;file2&apos; 所包含的内容</div><div class="line">- comm -3 file1 file2 比较两个文件的内容只删除两个文件共有的部分</div><div class="line">- dos2unix filedos.txt fileunix.txt 将一个文本文件的格式从MSDOS转换成UNIX</div><div class="line">- unix2dos fileunix.txt filedos.txt 将一个文本文件的格式从UNIX转换成MSDOS</div><div class="line">- recode ..HTML &lt; page.txt &gt; page.html 将一个文本文件转换成html</div><div class="line">- recode -l | more 显示所有允许的转换格式</div><div class="line">- badblocks -v /dev/hda1 检查磁盘hda1上的坏磁块</div><div class="line">- fsck /dev/hda1 修复/检查hda1磁盘上linux文件系统的完整性</div><div class="line">- fsck.ext2 /dev/hda1 修复/检查hda1磁盘上ext2文件系统的完整性</div><div class="line">- e2fsck /dev/hda1 修复/检查hda1磁盘上ext2文件系统的完整性</div><div class="line">- e2fsck -j /dev/hda1 修复/检查hda1磁盘上ext3文件系统的完整性</div><div class="line">- fsck.ext3 /dev/hda1 修复/检查hda1磁盘上ext3文件系统的完整性</div><div class="line">- fsck.vfat /dev/hda1 修复/检查hda1磁盘上fat文件系统的完整性</div><div class="line">- fsck.msdos /dev/hda1 修复/检查hda1磁盘上dos文件系统的完整性</div><div class="line">- dosfsck /dev/hda1 修复/检查hda1磁盘上dos文件系统的完整性</div><div class="line">- mkfs /dev/hda1 在hda1分区创建一个文件系统</div><div class="line">- mke2fs /dev/hda1 在hda1分区创建一个linux ext2的文件系统</div><div class="line">- mke2fs -j /dev/hda1 在hda1分区创建一个linux ext3(日志型)的文件系统</div><div class="line">- mkfs -t vfat 32 -F /dev/hda1 创建一个 FAT32 文件系统</div><div class="line">- fdformat -n /dev/fd0 格式化一个软盘</div><div class="line">- mkswap /dev/hda3 创建一个swap文件系统</div><div class="line">- SWAP文件系统</div><div class="line">- mkswap /dev/hda3 创建一个swap文件系统</div><div class="line">- swapon /dev/hda3 启用一个新的swap文件系统</div><div class="line">- swapon /dev/hda2 /dev/hdb3 启用两个swap分区</div><div class="line">- dump -0aj -f /tmp/home0.bak /home 制作一个 &apos;/home&apos; 目录的完整备份</div><div class="line">- dump -1aj -f /tmp/home0.bak /home 制作一个 &apos;/home&apos; 目录的交互式备份</div><div class="line">- restore -if /tmp/home0.bak 还原一个交互式备份</div><div class="line">- rsync -rogpav --delete /home /tmp 同步两边的目录</div><div class="line">- rsync -rogpav -e ssh --delete /home ip_address:/tmp 通过SSH通道rsync</div><div class="line">- rsync -az -e ssh --delete ip_addr:/home/public /home/local 通过ssh和压缩将一个远程目录同步到本地目录</div><div class="line">- rsync -az -e ssh --delete /home/local ip_addr:/home/public 通过ssh和压缩将本地目录同步到远程目录</div><div class="line">- dd bs=1M if=/dev/hda | gzip | ssh user@ip_addr &apos;dd of=hda.gz&apos; 通过ssh在远程主机上执行一次备份本地磁盘的操作</div><div class="line">- dd if=/dev/sda of=/tmp/file1 备份磁盘内容到一个文件</div><div class="line">- tar -Puf backup.tar /home/user 执行一次对 &apos;/home/user&apos; 目录的交互式备份操作</div><div class="line">- tar cf - . | (cd /tmp/backup ; tar xf - ) 本地将一个目录复制到另一个地方，保留原有权限及链接</div><div class="line">- find /home/user1 -name &apos;*.txt&apos; | xargs cp -av --target-directory=/home/backup/ --parents 从一个目录查找并复制所有以 &apos;.txt&apos; 结尾的文件到另一个目录</div><div class="line">- find /var/log -name &apos;*.log&apos; | tar cv --files-from=- | bzip2 &gt; log.tar.bz2 查找所有以 &apos;.log&apos; 结尾的文件并做成一个bzip包</div><div class="line">- dd if=/dev/hda of=/dev/fd0 bs=512 count=1 做一个将 MBR (Master Boot Record)内容复制到软盘的动作</div><div class="line">- dd if=/dev/fd0 of=/dev/hda bs=512 count=1 从已经保存到软盘的备份中恢复MBR内容</div><div class="line">- cdrecord -v gracetime=2 dev=/dev/cdrom -eject blank=fast -force 清空一个可复写的光盘内容</div><div class="line">- mkisofs /dev/cdrom &gt; cd.iso 在磁盘上创建一个光盘的iso镜像文件</div><div class="line">- mkisofs /dev/cdrom | gzip &gt; cd_iso.gz 在磁盘上创建一个压缩了的光盘iso镜像文件</div><div class="line">- mkisofs -J -allow-leading-dots -R -V &quot;Label CD&quot; -iso-level 4 -o ./cd.iso data_cd 创建一个目录的iso镜像文件</div><div class="line">- cdrecord -v dev=/dev/cdrom cd.iso 刻录一个ISO镜像文件</div><div class="line">- gzip -dc cd_iso.gz | cdrecord dev=/dev/cdrom - 刻录一个压缩了的ISO镜像文件</div><div class="line">- mount -o loop cd.iso /mnt/iso 挂载一个ISO镜像文件</div><div class="line">- cd-paranoia -B 从一个CD光盘转录音轨到 wav 文件中</div><div class="line">- cd-paranoia -- &quot;-3&quot; 从一个CD光盘转录音轨到 wav 文件中（参数-3）</div><div class="line">- cdrecord --scanbus 扫描总线以识别scsi通道</div><div class="line">- dd if=/dev/hdc | md5sum 校验一个设备的md5sum编码，例如一张 CD</div><div class="line">- ifconfig eth0 显示一个以太网卡的配置</div><div class="line">- ifup eth0 启用一个 &apos;eth0&apos; 网络设备</div><div class="line">- ifdown eth0 禁用一个 &apos;eth0&apos; 网络设备</div><div class="line">- ifconfig eth0 192.168.1.1 netmask 255.255.255.0 控制IP地址</div><div class="line">- ifconfig eth0 promisc 设置 &apos;eth0&apos; 成混杂模式以嗅探数据包 (sniffing)</div><div class="line">- dhclient eth0 以dhcp模式启用 &apos;eth0&apos;</div><div class="line">- route -n show routing table</div><div class="line">- route add -net 0/0 gw IP_Gateway configura default gateway</div><div class="line">- route add -net 192.168.0.0 netmask 255.255.0.0 gw 192.168.1.1 configure static route to reach network &apos;192.168.0.0/16&apos;</div><div class="line">- route del 0/0 gw IP_gateway remove static route</div><div class="line">- echo &quot;1&quot; &gt; /proc/sys/net/ipv4/ip_forward activate ip routing</div><div class="line">- hostname show hostname of system</div><div class="line">- host www.example.com lookup hostname to resolve name to ip address and viceversa(1)</div><div class="line">- nslookup www.example.com lookup hostname to resolve name to ip address and viceversa(2)</div><div class="line">- ip link show show link status of all interfaces</div><div class="line">- mii-tool eth0 show link status of &apos;eth0&apos;</div><div class="line">- ethtool eth0 show statistics of network card &apos;eth0&apos;</div><div class="line">- netstat -tup show all active network connections and their PID</div><div class="line">- netstat -tupl show all network services listening on the system and their PID</div><div class="line">- tcpdump tcp port 80 show all HTTP traffic</div><div class="line">- iwlist scan show wireless networks</div><div class="line">- iwconfig eth1 show configuration of a wireless network card</div><div class="line">- hostname show hostname</div><div class="line">- host www.example.com lookup hostname to resolve name to ip address and viceversa</div><div class="line">- nslookup www.example.com lookup hostname to resolve name to ip address and viceversa</div><div class="line">- whois www.example.com lookup on Whois database</div><div class="line">- GO TOP INDEX ^</div><div class="line">- Microsoft Windows networks (SAMBA)</div><div class="line">- nbtscan ip_addr netbios name resolution</div><div class="line">- nmblookup -A ip_addr netbios name resolution</div><div class="line">- smbclient -L ip_addr/hostname show remote shares of a windows host</div><div class="line">- smbget -Rr smb://ip_addr/share like wget can download files from a host windows via smb</div><div class="line">- mount -t smbfs -o username=user,password=pass //WinClient/share /mnt/share mount a windows network share</div></pre></td></tr></table></figure>
